<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Anvaya">
    <meta name="theme-color" id="themeColor" content="#FAF7F2">
    <title>Anvaya</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splashScreen" class="splash" onclick="app.dismissSplash()">
        <div class="splash-content">
            <img src="icons/icon-192.svg" class="splash-icon" alt="Anvaya">
            <h1 class="splash-title">Anvaya</h1>
            <p class="splash-tagline">Small Habits. Meaningful Change.</p>
        </div>
    </div>

    <!-- Onboarding -->
    <div id="onboarding" class="onboarding hidden">
        <div id="onboardingContent">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Main Content (swapped by tabs) -->
        <main id="mainContent">
            <!-- Rendered by JS -->
        </main>

        <!-- Bottom Tab Bar -->
        <nav id="tabBar" class="tab-bar">
            <button class="tab active" data-tab="today" onclick="app.switchTab('today')">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="3"/>
                    <path d="M3 10h18"/><path d="M9 2v4"/><path d="M15 2v4"/>
                    <path d="M9 15l2 2 4-4" stroke-width="2"/>
                </svg>
                <span class="tab-label">Today</span>
            </button>
            <button class="tab" data-tab="activities" onclick="app.switchTab('activities')">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/>
                    <rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/>
                </svg>
                <span class="tab-label">Activities</span>
            </button>
            <button class="tab" data-tab="profile" onclick="app.switchTab('profile')">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0112 0v1"/>
                </svg>
                <span class="tab-label" id="profileTabLabel">Profile</span>
            </button>
        </nav>
    </div>

    <!-- Log Entry Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="app.closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <button class="modal-close" onclick="app.closeModal()">Cancel</button>
                <h2 class="modal-title" id="modalTitle"></h2>
                <div style="width:60px"></div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Edit Activity Modal -->
    <div class="modal-overlay" id="editActivityOverlay" onclick="app.closeEditActivity()">
        <div class="modal modal-full" onclick="event.stopPropagation()">
            <div class="modal-header">
                <button class="modal-close" onclick="app.closeEditActivity()">Cancel</button>
                <h2 class="modal-title" id="editActivityTitle">New Activity</h2>
                <button class="modal-action" onclick="app.saveActivity()">Save</button>
            </div>
            <div class="modal-body" id="editActivityBody"></div>
        </div>
    </div>

    <!-- More Activities Modal -->
    <div class="modal-overlay" id="moreOverlay" onclick="app.closeMore()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <button class="modal-close" onclick="app.closeMore()">Done</button>
                <h2 class="modal-title">Add for Today</h2>
                <div style="width:60px"></div>
            </div>
            <div class="modal-body" id="moreBody"></div>
        </div>
    </div>

    <!-- Action Sheet (long-press on tile) -->
    <div class="modal-overlay" id="actionSheetOverlay" onclick="app.closeActionSheet()">
        <div class="action-sheet" onclick="event.stopPropagation()">
            <div class="action-sheet-header" id="actionSheetHeader"></div>
            <div id="actionSheetBody"></div>
            <button class="action-sheet-cancel" onclick="app.closeActionSheet()">Cancel</button>
        </div>
    </div>

    <script src="icons.js"></script>
    <script src="store.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
